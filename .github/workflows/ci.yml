# GNUVAULT CI — run the test suite + selftests on every push/PR. GPL-3.0-or-later.
name: ci
on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [ "3.9", "3.11", "3.12" ]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependency
        run: python -m pip install --upgrade pip && pip install cryptography
      - name: Selftests
        run: |
          python gnuvault.py
          python mausoleum.py
          python gnugui.py --headless
          python airgap.py
      - name: Test suite
        run: python test_gnuvault.py
