# GNUVAULT — publish to PyPI on a GitHub Release, via PyPI Trusted Publishing
# (OpenID Connect). No API token is stored anywhere: PyPI verifies the workflow
# identity directly. One-time setup on PyPI side — see README "Publishing".
# GPL-3.0-or-later.
name: publish
on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write        # required for Trusted Publishing (OIDC)

jobs:
  pypi:
    runs-on: ubuntu-latest
    environment: pypi     # match the GitHub environment configured on PyPI
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        run: python -m pip install --upgrade build && python -m build
      - name: Verify the distribution
        run: python -m pip install --upgrade twine && python -m twine check dist/*
      - name: Publish to PyPI (trusted publishing — no token)
        uses: pypa/gh-action-pypi-publish@release/v1
